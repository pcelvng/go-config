name: tag-release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump-minor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Bump minor version tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Skip if this commit is already tagged
          if git tag --points-at HEAD | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "HEAD is already tagged; skipping."
            exit 0
          fi

          latest="$(git tag -l 'v*.*.*' --sort=-v:refname | head -n1)"
          if [ -z "$latest" ]; then
            latest="v0.0.0"
          fi

          if ! echo "$latest" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Latest tag '$latest' is not a semver tag (vX.Y.Z); aborting."
            exit 1
          fi

          major="${latest#v}"
          major="${major%%.*}"
          minor_patch="${latest#v*.}"
          minor="${minor_patch%%.*}"
          new_minor=$((minor + 1))
          new_tag="v${major}.${new_minor}.0"

          echo "Latest tag: $latest"
          echo "New tag:    $new_tag"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$new_tag" -m "Release $new_tag"
          git push origin "refs/tags/$new_tag"
