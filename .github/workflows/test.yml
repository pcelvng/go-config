on: [push, pull_request]
name: Test
jobs:
  test:
    strategy:
      matrix:
        go-version: [1.18.x, 1.20.x, 1.22.x, 1.24.x]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Install Go
      uses: actions/setup-go@v2
      with:
        go-version: ${{ matrix.go-version }}
    - name: Checkout code
      uses: actions/checkout@v2
    - name: Test
      run: | 
        go test -v -race -covermode=atomic ./...
  coverage:
    runs-on: ubuntu-latest
    steps: 
     - name: Install Go
       uses: actions/setup-go@v2
       with: 
        go-version: 1.26.x
     - name: Checkout code
       uses: actions/checkout@v2
     - name: Test
       run: | 
        go test -v -race -coverprofile=coverage.txt -covermode=atomic
     - name: Coverage 
       uses: codecov/codecov-action@v2  